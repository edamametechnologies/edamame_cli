name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

# Auto cancel previous runs if they were not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Declare default permissions as read only.
permissions: read-all

jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu lane runs on the self-hosted vm-runner-linux pool to
          # bypass the github-hosted ubuntu IP allow-list 403 issue
          # against private edamametechnologies repos. 5 consecutive
          # ubuntu-latest runs failed during cargo's `git fetch` of
          # `edamame_core` with `403; class=Http (34)`; switching cargo
          # to system git (CARGO_NET_GIT_FETCH_WITH_CLI=true) reproduced
          # the same 403 from the system git binary, so the issue is
          # not libgit2-specific -- it is the egress IP being blocked
          # by the org-side allow list for the entire ubuntu pool.
          # See workspace.mdc "Known transient CI failures #2 -- cargo
          # git fetch 403 from github-hosted ubuntu runners on private
          # workspace crates" for the full diagnosis. Self-hosted
          # vm-runner-linux is on a permanently-allowlisted Azure VM.
          - os: ubuntu
            runs-on: vm-runner-linux
          - os: macos
            runs-on: macos-latest
          - os: windows
            runs-on: windows-2022
    runs-on: ${{ matrix.runs-on }}

    env:
      EDAMAME_APP_SENTRY: ${{ secrets.EDAMAME_APP_SENTRY }}
      PWNED_API_KEY: ${{ secrets.PWNED_API_KEY }}
      EDAMAME_TARGET: ${{ secrets.EDAMAME_TARGET }}
      EDAMAME_CORE_TARGET: ${{ secrets.EDAMAME_CORE_TARGET }}
      EDAMAME_CORE_SERVER: ${{ secrets.EDAMAME_CORE_SERVER }}
      EDAMAME_CA_PEM: ${{ secrets.EDAMAME_CA_PEM }}
      EDAMAME_CLIENT_PEM: ${{ secrets.EDAMAME_CLIENT_PEM }}
      EDAMAME_CLIENT_KEY: ${{ secrets.EDAMAME_CLIENT_KEY }}
      EDAMAME_SERVER_PEM: ${{ secrets.EDAMAME_SERVER_PEM }}
      EDAMAME_SERVER_KEY: ${{ secrets.EDAMAME_SERVER_KEY }}
      EDAMAME_CLIENT_CA_PEM: ${{ secrets.EDAMAME_CLIENT_CA_PEM }}
      LAMBDA_SIGNATURE: ${{ secrets.LAMBDA_SIGNATURE }}
      MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}

    steps:

      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}
          checkout: true
          # Runner protection. Required on the self-hosted vm-runner-linux
          # lane (workspace.mdc "Self-Hosted Runner Protection") and
          # also kept on for github-hosted macOS/Windows so a
          # supply-chain compromise of a CI dep would surface as
          # anomalous traffic / sensitive-material egress during the
          # test job. The github-hosted ubuntu vulnerability-start
          # hang historically blocked enabling this on the ubuntu
          # lane, but the lane has now moved to vm-runner-linux which
          # runs the detector cleanly (see test_linux.yml in
          # edamame_app for the canonical self-hosted Linux pattern).
          packet_capture: true
          vulnerability_detection: true
          vulnerability_detection_interval: "60"
          agentic_mode: analyze
          agentic_provider: edamame
          agentic_interval: 600
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
          # We are using the token of the the private repo to checkout the public repo and properly wait for access to the private repo
          token: ${{ secrets.DEV_GITHUB_TOKEN }}
          wait_for_api: true
          wait_for_https: true
          
      - name: Configure Git Authentication to import private crates
        run: |
          git config --global user.email "dev@edamame.tech"
          git config --global user.name "EDAMAME Dev"
          git config --global url."https://edamamedev:${{ secrets.DEV_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install additional packages w/ apt for linux
        if: matrix.os == 'ubuntu'
        shell: bash
        run: |
          wait_for_apt_locks() {
            echo "Checking for apt/dpkg locks..."
            local TIMEOUT=300
            local TIME_PASSED=0
            local LOCK_FILES=(
              "/var/lib/apt/lists/lock"
              "/var/lib/dpkg/lock-frontend"
              "/var/lib/dpkg/lock"
              "/var/cache/apt/archives/lock"
            )
            while [ $TIME_PASSED -lt $TIMEOUT ]; do
              local LOCKED=false
              if command -v fuser >/dev/null 2>&1; then
                for lock_file in "${LOCK_FILES[@]}"; do
                  if [ -f "$lock_file" ] && sudo fuser "$lock_file" >/dev/null 2>&1; then
                    LOCKED=true
                    break
                  fi
                done
              fi
              if [ "$LOCKED" = "false" ]; then
                if ! sudo dpkg --configure -a 2>/dev/null; then
                  LOCKED=true
                fi
              fi
              if [ "$LOCKED" = "false" ]; then
                echo "No apt/dpkg locks held, proceeding..."
                return 0
              fi
              echo "Waiting for apt/dpkg locks... ($TIME_PASSED/${TIMEOUT}s)"
              sleep 5
              TIME_PASSED=$((TIME_PASSED + 5))
            done
            echo "Timed out waiting for apt/dpkg locks"
            return 1
          }
          
          run_apt() {
            local MAX_ATTEMPTS=10
            local ATTEMPTS=0
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              ATTEMPTS=$((ATTEMPTS + 1))
              echo "apt-get $* (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
              if ! wait_for_apt_locks; then sleep 5; continue; fi
              if sudo -E apt-get "$@"; then return 0; fi
              sleep 5
            done
            return 1
          }
          
          export DEBIAN_FRONTEND=noninteractive
          wait_for_apt_locks
          # Install build dependencies (no libpcap needed - CLI is RPC client only)
          run_apt update -y
          run_apt install -y protobuf-compiler pkg-config libgtk-3-dev

      - name: Install additional packages w/ Homebrew for macOS
        if: matrix.os == 'macos'
        run: |
          brew install protobuf
          brew install wget

      - name: Setup .NET 8.0 for Windows
        if: matrix.os == 'windows'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install additional packages w/ Chocolatey for Windows
        if: matrix.os == 'windows'
        run: |
          choco install protoc wget
          # Only install AzureSignTool if not already installed
          if (-not (dotnet tool list --global | Select-String -Pattern "AzureSignTool")) {
            dotnet tool install --global AzureSignTool
          }

      - name: Configure Windows clang-cl toolchain
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $clang = 'C:\Program Files\LLVM\bin\clang-cl.exe'
          $llvmLib = 'C:\Program Files\LLVM\bin\llvm-lib.exe'
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            choco install llvm -y
          }
          if (!(Test-Path $clang) -or !(Test-Path $llvmLib)) {
            throw "LLVM Windows toolchain not found"
          }
          "CC_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=$clang" >> $env:GITHUB_ENV
          "AR_x86_64_pc_windows_msvc=$llvmLib" >> $env:GITHUB_ENV

      - name: Set environment variables
        shell: bash
        run: |
            echo "KEYCHAIN_PATH=/tmp/app-signing.keychain-db" >> $GITHUB_ENV
            echo "BINARY_PATH=./target/release/edamame_cli" >> $GITHUB_ENV
  
      - name: Add Defender exclusions for build temp paths
        if: matrix.os == 'windows'
        shell: pwsh
        continue-on-error: true
        run: |
          # Mitigate Defender real-time-scan race on prost-build's
          # `$env:TEMP\prost-buildXXX\prost-descriptor-set` and on
          # rlib renames in `target\`. tonic-build's in-process
          # 3x retry is not enough -- each retry creates a new temp
          # dir and Defender hits it again. Exclude the canonical
          # locations the build chain writes through.
          $tempDir = $env:TEMP
          $repoDir = "${env:GITHUB_WORKSPACE}"
          $targetDir = "${env:GITHUB_WORKSPACE}\target"
          $cargoHome = "${env:USERPROFILE}\.cargo"
          $rustupHome = "${env:USERPROFILE}\.rustup"
          foreach ($p in @($tempDir, $repoDir, $targetDir, $cargoHome, $rustupHome)) {
            try {
              Add-MpPreference -ExclusionPath $p -ErrorAction Stop
              Write-Host "Added Defender ExclusionPath: $p"
            } catch {
              Write-Host "WARN: failed to add Defender ExclusionPath for ${p}: $_"
            }
          }
          foreach ($e in @("cargo.exe","rustc.exe","rustdoc.exe","link.exe","cl.exe","lib.exe","mt.exe","cmake.exe","ninja.exe","light.exe","candle.exe","signtool.exe","AzureSignTool.exe")) {
            try {
              Add-MpPreference -ExclusionProcess $e -ErrorAction Stop
              Write-Host "Added Defender ExclusionProcess: $e"
            } catch {
              Write-Host "WARN: failed to add Defender ExclusionProcess for ${e}: $_"
            }
          }

      - name: Build application
        shell: bash
        run: |
          # Windows cargo builds intermittently hit a file-locking
          # race during link / prost-build descriptor generation
          # ('os error 32: process cannot access the file because it
          # is being used by another process') driven by rustc's
          # parallel codegen units overlapping link.exe / build
          # script writes. The step above adds Defender exclusions
          # for $env:TEMP and target/ but the race can still slip
          # through between exclusion-apply and file-touch, so we
          # keep the retry ladder below as a belt-and-suspenders
          # safety net.
          #
          # Strategy on Windows (other platforms run a single pass):
          #   - Attempt 1: default parallelism (fast path).
          #   - Attempt 2: --jobs 1 (serialize crate compilation).
          #   - Attempt 3: --jobs 1 + RUSTFLAGS=-Ccodegen-units=1
          #     (also serialize within each crate -- slowest but
          #     eliminates the race entirely).
          # Cached object files from earlier attempts survive between
          # retries so each retry only recompiles what was missing.
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            cargo build --release
            exit 0
          fi
          set +e
          cargo build --release
          rc=$?
          if (( rc != 0 )); then
            echo "cargo build failed (attempt 1/3, rc=$rc) - retrying with --jobs 1"
            sleep 5
            cargo build --release --jobs 1
            rc=$?
          fi
          if (( rc != 0 )); then
            echo "cargo build failed (attempt 2/3, rc=$rc) - retrying with --jobs 1 + codegen-units=1"
            sleep 5
            RUSTFLAGS="-C codegen-units=1" cargo build --release --jobs 1
            rc=$?
          fi
          set -e
          if (( rc != 0 )); then
            echo "cargo build failed after 3 attempts (rc=$rc)"
            exit "$rc"
          fi
  
      - name: Signing for macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          # Create certificate files from secrets base64
          echo ${{ secrets.APPLE_DEVELOPMENT_CER }} | base64 --decode > certificate_dev.cer
          echo ${{ secrets.APPLE_DEVELOPMENT_KEY }} | base64 --decode > certificate_dev.key
          echo ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CER }} | base64 --decode > certificate_installer.cer
          echo ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_KEY }} | base64 --decode > certificate_installer.key
          echo ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CER }} | base64 --decode > certificate_application.cer
          echo ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_KEY }} | base64 --decode > certificate_application.key
          
          # Create p12 file
          openssl pkcs12 -export -name zup -in certificate_dev.cer -inkey certificate_dev.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_dev.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          openssl pkcs12 -export -name zup -in certificate_installer.cer -inkey certificate_installer.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_installer.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          openssl pkcs12 -export -name zup -in certificate_application.cer -inkey certificate_application.key -passin pass:${{ secrets.APPLE_P12_PASSWORD }} -out certificate_application.p12 -passout pass:${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        
          # Configure Keychain
          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          
          # Import certificates on Keychain
          security import certificate_dev.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import certificate_installer.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import certificate_application.p12 -P "${{ secrets.APPLE_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Verify Keychain
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Sign + hardened runtime
          ./macos/sign.sh $BINARY_PATH

      - name: Signing for Windows
        if: matrix.os == 'windows'
        # We can't use bash here, as the AzureSignTool is a .NET tool
        run: AzureSignTool sign -kvt ${{ secrets.AZURE_SIGN_TENANT_ID }} -kvu ${{ secrets.AZURE_SIGN_KEY_VAULT_URI }} -kvi ${{ secrets.AZURE_SIGN_CLIENT_ID }} -kvs ${{ secrets.AZURE_SIGN_CLIENT_SECRET }} -kvc ${{ secrets.AZURE_SIGN_CERT_NAME }} -tr http://timestamp.digicert.com -v ./target/release/edamame_cli.exe

      - name: Run tests
        id: tests
        shell: bash
        run: |
          # Same Windows file-locking race as the "Build application"
          # step above. The Makefile target is `cargo test --
          # --nocapture`; on Windows we fall back to single-job /
          # single codegen-unit retries to escape the parallel
          # link.exe race when the default-parallel run hits it.
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            make test
            exit 0
          fi
          set +e
          make test
          rc=$?
          if (( rc != 0 )); then
            echo "make test failed (attempt 1/3, rc=$rc) - retrying with --jobs 1"
            sleep 5
            cargo test --jobs 1 -- --nocapture
            rc=$?
          fi
          if (( rc != 0 )); then
            echo "make test failed (attempt 2/3, rc=$rc) - retrying with --jobs 1 + codegen-units=1"
            sleep 5
            RUSTFLAGS="-C codegen-units=1" cargo test --jobs 1 -- --nocapture
            rc=$?
          fi
          set -e
          if (( rc != 0 )); then
            echo "make test failed after 3 attempts (rc=$rc)"
            exit "$rc"
          fi
        continue-on-error: true

      # Runner protection. The gate is enforced strictly on the
      # self-hosted vm-runner-linux lane because that runner has a
      # persistent dismissal store and any non-dismissed
      # HIGH/CRITICAL finding represents a real anomaly that must
      # block the job (workspace.mdc "Self-Hosted Runner Protection").
      # On github-hosted macOS/Windows the gate is visibility-only
      # (`false`) because every fresh ephemeral runner produces the
      # same baseline CI-runner false positives with no persistent
      # dismissal store to suppress them.
      - name: EDAMAME Posture vulnerability gate
        if: always()
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          dump_vulnerability_findings: true
          exit_on_vulnerability_findings: ${{ matrix.os == 'ubuntu' }}

      - name: Slack alerts
        if: steps.tests.outcome != 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C072J0U9TH7'
          slack-message: "Tests ran in ${{ github.workflow }} for ${{ github.repository }} for ${{ runner.os }} on branch ${{ github.ref }} failed: see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail job if tests failed
        if: steps.tests.outcome != 'success'
        run: |
          echo "Forcing job to fail because tests did not succeed."
          exit 1
